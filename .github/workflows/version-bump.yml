name: Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version bump 📈
        id: bump
        shell: bash
        run: |
          # Get last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"
          
          # Parse current version
          VERSION="${LAST_TAG:1}"  # Remove 'v' prefix
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          echo "Current version: $MAJOR.$MINOR.$PATCH"
          
          # Check commits since last tag
          COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --format=%B)
          
          BUMP_TYPE="none"
          
          # Check for breaking changes (major)
          if echo "$COMMITS" | grep -q "BREAKING CHANGE:"; then
            BUMP_TYPE="major"
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          # Check for features (minor)
          elif echo "$COMMITS" | grep -q "^feat"; then
            BUMP_TYPE="minor"
            MINOR=$((MINOR + 1))
            PATCH=0
          # Check for fixes (patch)
          elif echo "$COMMITS" | grep -q "^fix"; then
            BUMP_TYPE="patch"
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"
          
          echo "bump=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          
          if [[ "$BUMP_TYPE" == "none" ]]; then
            echo "ℹ️  No versioned commits found (only chore/docs/style), skipping release"
          else
            echo "Version bump: $BUMP_TYPE ($VERSION -> $NEW_VERSION)"
          fi

      - name: Create and push tag 🏷️
        if: steps.bump.outputs.bump != 'none'
        shell: bash
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"
          
          echo "✓ Created and pushed tag: $TAG"
